# Parameter sweep configuration for LLM operator benchmarks
# Each list will be combined via Cartesian product.

batch_sizes: [1, 2, 4, 8]
seq_lens: [256, 512, 1024, 2048]
hidden_dims: [512, 1024, 2048]
num_heads: [12, 24, 32]      # head_dim = hidden_dim / num_heads

dtype: "float16"
warmup_iters: 200
bench_iters: 1000
max_memory_gb: 6
